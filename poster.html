<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>M-Space Link Shortener - Launch Poster</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap');
  </style>
</head>
<body class="bg-gradient-to-br from-green-800 to-green-950 min-h-screen flex items-center justify-center p-8">
  <div class="bg-white rounded-3xl shadow-2xl p-12 max-w-2xl text-center">
    <!-- Logo -->
    <div class="w-32 h-32 mx-auto mb-6 bg-amber-500 rounded-full flex items-center justify-center shadow-lg">
      <span class="text-5xl font-black text-green-800">M</span>
    </div>
    
    <!-- Title -->
    <h1 class="text-5xl font-black text-green-800 mb-2" style="font-family: 'Poppins', sans-serif;">
      M-Space
    </h1>
    <h2 class="text-3xl font-bold text-amber-500 mb-6">
      Link Shortener
    </h2>
    
    <!-- Tagline -->
    <p class="text-2xl text-gray-700 mb-8 font-medium">
      Short links with <span class="text-green-700 font-bold">purpose</span> 💚
    </p>
    
    <!-- Features -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="bg-green-50 rounded-xl p-4">
        <span class="text-2xl">🔗</span>
        <p class="text-green-800 font-bold">Fast Shortening</p>
      </div>
      <div class="bg-green-50 rounded-xl p-4">
        <span class="text-2xl">📊</span>
        <p class="text-green-800 font-bold">Click Analytics</p>
      </div>
      <div class="bg-green-50 rounded-xl p-4">
        <span class="text-2xl">✨</span>
        <p class="text-green-800 font-bold">QR Codes</p>
      </div>
      <div class="bg-green-50 rounded-xl p-4">
        <span class="text-2xl">🤖</span>
        <p class="text-green-800 font-bold">AI Features</p>
      </div>
    </div>
    
    <!-- URL -->
    <div class="bg-gray-100 rounded-xl p-4 mb-6">
      <p class="text-2xl font-bold text-green-700">l.m-space.in</p>
    </div>
    
    <!-- Footer -->
    <p class="text-gray-500 text-sm">
      Built with ❤️ for the community
    </p>
  </div>
</body>
</html>
